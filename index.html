<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错没错 - 赛博道德法庭</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f0f4ff; font-family: sans-serif; }
        .cute-font { font-family: 'ZCOOL KuaiLe', cursive; }
        .bubble-card { border-radius: 24px; }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-bold text-indigo-600 cute-font mb-2">错没错？</h1>
            <p class="text-gray-500">赛博审判 · 专治不服</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <!-- 输入区 -->
                <div class="bg-white p-6 shadow-xl bubble-card border-4 border-indigo-100">
                    <textarea id="situationInput" rows="4" class="w-full p-4 border-2 border-indigo-100 rounded-xl focus:border-indigo-400 outline-none text-lg mb-4" placeholder="在此输入你的情况..."></textarea>
                    
                    <button id="judgeBtn" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 rounded-xl text-xl cute-font shadow-lg transition-all">
                        立刻审判
                    </button>

                    <!-- 设置区 -->
                    <div class="mt-4 space-y-3 border-t pt-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-gray-400 font-bold mb-1">审判核心</label>
                                <select id="modelSelect" class="w-full p-2 border rounded-lg text-sm bg-gray-50">
                                    <option value="deepseek">DeepSeek-Chat</option>
                                    <option value="zhipu">智谱 GLM-4-Flash</option>
                                </select>
                            </div>
                            <div id="apiKeySection">
                                <label class="block text-xs text-gray-400 font-bold mb-1">API Key</label>
                                <input type="password" id="customApiKey" class="w-full p-2 border rounded-lg text-sm" placeholder="输入对应平台的 API Key">
                            </div>
                        </div>
                    </div>
                </div>

                <div id="loadingArea" class="hidden text-center py-4 bg-yellow-50 rounded-2xl border-2 border-yellow-200">
                    <span class="text-yellow-700 font-bold">法官们正在激烈辩论中<span class="loading-dots"></span></span>
                </div>

                <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
                    <!-- 四位法官卡片 -->
                    <div id="card-elder" class="bg-red-50 p-4 bubble-card border-2 border-red-100">
                        <div class="font-bold text-red-800 mb-1">👴 老古板</div>
                        <p class="text-xs text-gray-600 italic h-16 overflow-y-auto personality-comment"></p>
                        <div class="text-right font-black text-red-600 text-lg personality-score">0</div>
                    </div>
                    <div id="card-goblin" class="bg-purple-50 p-4 bubble-card border-2 border-purple-100">
                        <div class="font-bold text-purple-800 mb-1">👺 乐子人</div>
                        <p class="text-xs text-gray-600 italic h-16 overflow-y-auto personality-comment"></p>
                        <div class="text-right font-black text-purple-600 text-lg personality-score">0</div>
                    </div>
                    <div id="card-angel" class="bg-blue-50 p-4 bubble-card border-2 border-blue-100">
                        <div class="font-bold text-blue-800 mb-1">👼 共情天使</div>
                        <p class="text-xs text-gray-600 italic h-16 overflow-y-auto personality-comment"></p>
                        <div class="text-right font-black text-blue-600 text-lg personality-score">0</div>
                    </div>
                    <div id="card-logic" class="bg-green-50 p-4 bubble-card border-2 border-green-100">
                        <div class="font-bold text-green-800 mb-1">🤖 逻辑魔王</div>
                        <p class="text-xs text-gray-600 italic h-16 overflow-y-auto personality-comment"></p>
                        <div class="text-right font-black text-green-700 text-lg personality-score">0</div>
                    </div>
                </div>

                <div id="finalVerdict" class="hidden p-6 bg-indigo-600 rounded-3xl text-white shadow-xl">
                    <h2 id="verdictHeader" class="text-2xl font-bold cute-font mb-2">法庭结论</h2>
                    <p id="verdictText" class="text-sm opacity-90"></p>
                </div>
            </div>

            <!-- 右侧历史 -->
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-white p-4 rounded-3xl shadow-md border border-indigo-50 h-80 flex flex-col">
                    <h3 class="font-bold text-indigo-800 mb-2">📜 历史案卷</h3>
                    <div id="historyList" class="flex-1 overflow-y-auto space-y-2 pr-1 text-xs">
                        <p class="text-gray-300 text-center mt-10">暂无记录</p>
                    </div>
                    <button id="clearHistory" class="mt-2 text-[10px] text-red-300 hover:text-red-500 underline">清空记录</button>
                </div>
            </div>
        </div>

        <!-- 页脚免责声明 -->
        <footer class="mt-12 mb-8 text-center text-gray-400 text-xs space-y-2">
            <p>免责声明：本页面审判结果由 AI 随机生成，仅供娱乐及调侃，不代表真实的法律建议或道德准则。</p>
            <p class="cute-font text-sm text-indigo-300">By Naizi</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const judgeBtn = document.getElementById('judgeBtn');
            const situationInput = document.getElementById('situationInput');
            const modelSelect = document.getElementById('modelSelect');
            const historyList = document.getElementById('historyList');

            function loadHistory() {
                const saved = JSON.parse(localStorage.getItem('court_history') || '[]');
                if (saved.length === 0) {
                    historyList.innerHTML = '<p class="text-gray-300 text-center mt-10">暂无记录</p>';
                    return;
                }
                historyList.innerHTML = saved.map(item => `
                    <div class="p-2 bg-gray-50 rounded-lg border border-gray-100">
                        <div class="font-bold truncate">${item.text}</div>
                        <div class="flex justify-between text-[10px] text-gray-400">
                            <span>得分: ${item.score}</span>
                            <span>${new Date(item.time).toLocaleTimeString()}</span>
                        </div>
                    </div>
                `).join('');
            }
            loadHistory();

            document.getElementById('clearHistory').onclick = () => {
                localStorage.removeItem('court_history');
                loadHistory();
            };

            const personalities = [
                { id: 'card-elder', name: '老古板', prompt: '你极端保守且严厉。输出JSON: {"score": 数字, "comment": "评价"}' },
                { id: 'card-goblin', name: '乐子人', prompt: '你是顶级乐子人，说话抽象，多用梗。输出JSON: {"score": 数字, "comment": "评价"}' },
                { id: 'card-angel', name: '共情天使', prompt: '你极度温柔治愈。输出JSON: {"score": 数字, "comment": "评价"}' },
                { id: 'card-logic', name: '逻辑魔王', prompt: '你是冷静理性的AI机器人。输出JSON: {"score": 数字, "comment": "评价"}' }
            ];

            async function askAI(p, input, modelType, key) {
                const sys = `你是【${p.name}】。${p.prompt}。严格输出JSON {"score": 0-100, "comment": "..."}。`;
                
                const url = modelType === 'deepseek' ? "https://api.deepseek.com/chat/completions" : "https://open.bigmodel.cn/api/paas/v4/chat/completions";
                const modelName = modelType === 'deepseek' ? "deepseek-chat" : "glm-4-flash";

                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${key}` 
                    },
                    body: JSON.stringify({
                        model: modelName,
                        messages: [{role:"system", content:sys}, {role:"user", content:input}],
                        response_format: { type: "json_object" }
                    })
                });
                const data = await resp.json();
                const content = data.choices[0].message.content;
                return JSON.parse(content.replace(/```json|```/g, "").trim());
            }

            judgeBtn.addEventListener('click', async function() {
                const text = situationInput.value.trim();
                const key = document.getElementById('customApiKey').value.trim();
                const type = modelSelect.value;

                if (!text) return alert("请输入案情！");
                if (!key) return alert("请输入 API Key！");

                judgeBtn.disabled = true;
                document.getElementById('loadingArea').classList.remove('hidden');
                document.getElementById('resultsGrid').classList.add('hidden');
                document.getElementById('finalVerdict').classList.add('hidden');

                try {
                    const results = await Promise.all(personalities.map(p => askAI(p, text, type, key)));
                    
                    let total = 0;
                    results.forEach((res, i) => {
                        const card = document.getElementById(personalities[i].id);
                        card.querySelector('.personality-comment').innerText = `“${res.comment}”`;
                        card.querySelector('.personality-score').innerText = res.score;
                        total += res.score;
                    });

                    const avg = Math.round(total / 4);
                    const isVague = text.length < 5 || text.includes("我错了吗");
                    
                    if (isVague) {
                        document.getElementById('verdictHeader').innerText = "❓ 赛博废话";
                        document.getElementById('verdictText').innerText = "法官们面面相觑，建议提供更多细节后再来审判。";
                    } else {
                        document.getElementById('verdictHeader').innerText = avg > 70 ? "🌟 问心无愧" : (avg > 40 ? "🤔 很难评" : "❌ 纯纯的错");
                        document.getElementById('verdictText').innerText = avg > 70 ? "你是对的，继续坚持你的原则！" : "大家的意见很大，建议你反思一下。";
                    }
                    
                    const history = JSON.parse(localStorage.getItem('court_history') || '[]');
                    history.unshift({ text, score: avg, time: Date.now() });
                    localStorage.setItem('court_history', JSON.stringify(history.slice(0, 10)));
                    loadHistory();

                    document.getElementById('loadingArea').classList.add('hidden');
                    document.getElementById('resultsGrid').classList.remove('hidden');
                    document.getElementById('finalVerdict').classList.remove('hidden');
                } catch (err) {
                    alert("错误: " + err.message);
                } finally {
                    judgeBtn.disabled = false;
                    document.getElementById('loadingArea').classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
