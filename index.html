<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错没错 - 赛博道德法庭</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .cute-font { font-family: 'ZCOOL KuaiLe', cursive; }
        .bubble-card {
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bubble-card:hover { transform: scale(1.01); }
        .btn-bounce:active { transform: scale(0.95); }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .floating { animation: float 3s ease-in-out infinite; }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 pb-20">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-6xl font-bold text-indigo-600 cute-font mb-2 floating">错没错？</h1>
            <p class="text-gray-500 text-lg italic">—— 赛博道德法庭，专治各种不服 ——</p>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Side: Input & Settings -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 shadow-xl bubble-card border-4 border-indigo-100">
                    <label class="block text-indigo-800 text-xl font-bold mb-4 cute-font">案情描述：</label>
                    <textarea id="situationInput" rows="5" class="w-full p-4 border-2 border-indigo-200 rounded-2xl focus:border-indigo-500 focus:outline-none text-gray-700 text-lg mb-4" placeholder="说出你的故事，或者发个‘我错了吗’来调戏法官..."></textarea>
                    
                    <button id="judgeBtn" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 px-8 rounded-2xl text-2xl cute-font shadow-lg btn-bounce transition-all disabled:opacity-50">
                        审判开始！
                    </button>

                    <div class="mt-6 border-t pt-4 space-y-4">
                        <div class="flex flex-wrap gap-4">
                            <div class="flex-1 min-w-[150px]">
                                <label class="block text-xs font-bold text-gray-400 mb-1">审判核心</label>
                                <select id="modelSelect" class="w-full p-2 border border-indigo-100 rounded-xl text-sm bg-gray-50">
                                    <option value="deepseek">DeepSeek-Chat</option>
                                    <option value="zhipu">智谱 GLM-4-Flash</option>
                                </select>
                            </div>
                            <div class="flex-1 min-w-[150px]">
                                <label class="block text-xs font-bold text-gray-400 mb-1">API Key</label>
                                <input type="password" id="customApiKey" class="w-full p-2 border border-indigo-100 rounded-xl text-sm bg-gray-50" placeholder="填入 Key 开启审判">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Progress/Loading -->
                <div id="loadingArea" class="hidden text-center">
                    <div class="inline-block p-4 bg-yellow-100 rounded-full border-2 border-yellow-200 text-yellow-700 font-bold">
                        法官们正在查阅卷宗（吵架中）<span class="loading-dots"></span>
                    </div>
                </div>

                <!-- Results Grid -->
                <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
                    <div id="card-elder" class="bg-red-50 p-4 bubble-card border-2 border-red-200 shadow-sm">
                        <div class="flex items-center mb-2"><span class="text-2xl mr-2">👴</span><h3 class="font-bold text-red-800">老古板</h3></div>
                        <p class="text-sm text-gray-700 italic h-20 overflow-y-auto mb-2 personality-comment"></p>
                        <div class="text-right font-black text-red-600 text-xl personality-score">0</div>
                    </div>
                    <div id="card-goblin" class="bg-purple-50 p-4 bubble-card border-2 border-purple-200 shadow-sm">
                        <div class="flex items-center mb-2"><span class="text-2xl mr-2">👺</span><h3 class="font-bold text-purple-800">乐子人</h3></div>
                        <p class="text-sm text-gray-700 italic h-20 overflow-y-auto mb-2 personality-comment"></p>
                        <div class="text-right font-black text-purple-600 text-xl personality-score">0</div>
                    </div>
                    <div id="card-angel" class="bg-blue-50 p-4 bubble-card border-2 border-blue-200 shadow-sm">
                        <div class="flex items-center mb-2"><span class="text-2xl mr-2">👼</span><h3 class="font-bold text-blue-800">共情天使</h3></div>
                        <p class="text-sm text-gray-700 italic h-20 overflow-y-auto mb-2 personality-comment"></p>
                        <div class="text-right font-black text-blue-600 text-xl personality-score">0</div>
                    </div>
                    <div id="card-logic" class="bg-green-50 p-4 bubble-card border-2 border-green-200 shadow-sm">
                        <div class="flex items-center mb-2"><span class="text-2xl mr-2">🤖</span><h3 class="font-bold text-green-800">逻辑魔王</h3></div>
                        <p class="text-sm text-gray-700 italic h-20 overflow-y-auto mb-2 personality-comment"></p>
                        <div class="text-right font-black text-green-700 text-xl personality-score">0</div>
                    </div>
                </div>

                <!-- Final Verdict -->
                <div id="finalVerdict" class="hidden p-6 bg-indigo-600 rounded-3xl text-white shadow-2xl border-4 border-white">
                    <div id="verdictHeader" class="text-3xl font-bold cute-font mb-2">法庭结论</div>
                    <div id="verdictText" class="text-xl mb-4 font-bold opacity-90"></div>
                    <div class="h-2 bg-indigo-400 rounded-full overflow-hidden mb-2">
                        <div id="verdictProgress" class="h-full bg-yellow-400 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Right Side: History -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 shadow-lg rounded-3xl border-2 border-dashed border-indigo-200 h-full max-h-[800px] flex flex-col">
                    <h3 class="text-xl font-bold text-indigo-800 cute-font mb-4 flex items-center">
                        📜 历史案卷
                        <span id="historyCount" class="ml-2 text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full">0</span>
                    </h3>
                    <div id="historyList" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                        <p class="text-gray-400 text-sm italic text-center py-10">暂无审判记录...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;

        // UI Elements
        const situationInput = document.getElementById('situationInput');
        const judgeBtn = document.getElementById('judgeBtn');
        const loadingArea = document.getElementById('loadingArea');
        const resultsGrid = document.getElementById('resultsGrid');
        const finalVerdict = document.getElementById('finalVerdict');
        const modelSelect = document.getElementById('modelSelect');
        const customApiKeyInput = document.getElementById('customApiKey');
        const historyList = document.getElementById('historyList');
        const historyCount = document.getElementById('historyCount');

        // Personalities
        const personalities = [
            { id: 'card-elder', name: '严厉的老古板', prompt: '你极端守旧。如果用户输入的内容太短或无意义（如“我错了吗”），请给出 50 分并训斥他浪费时间。如果是具体事件，按传统道德审判。' },
            { id: 'card-goblin', name: '混沌乐子人', prompt: '你是顶级乐子人。不管用户说什么，你都要强行“锐评”。说话风格要抽象，多用互联网黑话。如果内容无意义，就疯狂嘲讽他的空虚。' },
            { id: 'card-angel', name: '共情小天使', prompt: '你极度温柔。如果内容无意义，请温柔地问他是不是今天心情不好想找人聊天。' },
            { id: 'card-logic', name: '逻辑大魔王', prompt: '你是理性AI。如果内容无意义，请冷酷地指出其信息量缺失，判定为无法审判。' }
        ];

        // Auth Init
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error("Auth failed", e); }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) loadHistory();
        });

        // Load History (Rule 2: Fetch all and sort in memory)
        function loadHistory() {
            if (!currentUser) return;
            const historyRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'history');
            onSnapshot(historyRef, (snapshot) => {
                const docs = [];
                snapshot.forEach(d => docs.push({id: d.id, ...d.data()}));
                // Sort by timestamp desc
                docs.sort((a, b) => b.timestamp - a.timestamp);
                renderHistory(docs);
            }, (err) => console.error("History sync error", err));
        }

        function renderHistory(docs) {
            historyCount.innerText = docs.length;
            if (docs.length === 0) {
                historyList.innerHTML = `<p class="text-gray-400 text-sm italic text-center py-10">暂无审判记录...</p>`;
                return;
            }
            historyList.innerHTML = docs.map(d => `
                <div class="p-3 bg-indigo-50 rounded-2xl border border-indigo-100 hover:bg-white transition-colors cursor-pointer group shadow-sm" onclick="alert('${d.situation.replace(/'/g, "\\'")}')">
                    <div class="text-xs text-gray-400 mb-1">${new Date(d.timestamp).toLocaleString()}</div>
                    <div class="text-sm text-indigo-900 font-bold truncate">${d.situation}</div>
                    <div class="mt-1 flex justify-between items-center">
                        <span class="text-[10px] bg-indigo-200 text-indigo-700 px-1.5 py-0.5 rounded">得分: ${d.averageScore}</span>
                        <span class="text-[10px] text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity">点击查看原文</span>
                    </div>
                </div>
            `).join('');
        }

        async function fetchJudgment(personality, userInput) {
            const selectedModel = modelSelect.value;
            const activeKey = customApiKeyInput.value.trim();
            if (!activeKey) throw new Error(`请输入 ${selectedModel.toUpperCase()} 的 API Key`);

            const systemPrompt = `你正在参与“错没错”游戏。作为【${personality.name}】审判。${personality.prompt}。
            要求：严格输出JSON {"score": 数字, "comment": "评价"}。评价要简短有力。`;

            const url = selectedModel === 'deepseek' ? "https://api.deepseek.com/chat/completions" : "https://open.bigmodel.cn/api/paas/v4/chat/completions";
            const body = {
                model: selectedModel === 'deepseek' ? "deepseek-chat" : "glm-4-flash",
                messages: [{ role: "system", content: systemPrompt }, { role: "user", content: userInput }],
                response_format: { type: "json_object" }
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${activeKey}` },
                body: JSON.stringify(body)
            });
            const data = await response.json();
            const textContent = data.choices[0].message.content;
            return JSON.parse(textContent.replace(/```json|```/g, "").trim());
        }

        judgeBtn.addEventListener('click', async () => {
            const situation = situationInput.value.trim();
            if (!situation) return alert("空手套白狼？写点什么再审判吧！");

            judgeBtn.disabled = true;
            loadingArea.classList.remove('hidden');
            resultsGrid.classList.add('hidden');
            finalVerdict.classList.remove('hidden');
            finalVerdict.classList.add('opacity-50');

            try {
                const results = await Promise.all(personalities.map(p => fetchJudgment(p, situation)));
                let totalScore = 0;
                
                results.forEach((res, index) => {
                    const card = document.getElementById(personalities[index].id);
                    card.querySelector('.personality-comment').innerText = `“${res.comment}”`;
                    card.querySelector('.personality-score').innerText = res.score;
                    totalScore += res.score;
                });

                const averageScore = Math.round(totalScore / personalities.length);
                const verdictText = document.getElementById('verdictText');
                const progress = document.getElementById('verdictProgress');

                // Logic for Indeterminable or Trolling
                const isVague = situation.length < 5 || situation.includes("我错了吗") || averageScore === 50;

                if (isVague) {
                    document.getElementById('verdictHeader').innerText = "❓ 赛博迷惑行为";
                    verdictText.innerText = "法官们面面相觑。你的问题就像你的生活一样，由于缺乏细节而显得空虚至极。建议细说，或者去洗个澡清醒一下。";
                    progress.className = "h-full bg-gray-400";
                } else if (averageScore >= 80) {
                    document.getElementById('verdictHeader').innerText = "🌟 道德完人";
                    verdictText.innerText = "你是对的。如果你觉得不舒服，那一定是这个世界出了问题。";
                    progress.className = "h-full bg-green-400";
                } else if (averageScore >= 50) {
                    document.getElementById('verdictHeader').innerText = "🤔 灰色边缘";
                    verdictText.innerText = "没啥大错，但你做这事儿的时候心里肯定虚。建议别想了，睡一觉就好。";
                    progress.className = "h-full bg-yellow-400";
                } else {
                    document.getElementById('verdictHeader').innerText = "❌ 纯纯的错";
                    verdictText.innerText = "别挣扎了，法官们已经开始商量把你埋哪儿了。赶紧去道歉吧亲！";
                    progress.className = "h-full bg-red-500";
                }

                progress.style.width = averageScore + '%';
                
                // Save to Firestore (Rule 1)
                if (currentUser) {
                    await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'history'), {
                        situation: situation,
                        averageScore: averageScore,
                        timestamp: Date.now()
                    });
                }

                loadingArea.classList.add('hidden');
                resultsGrid.classList.remove('hidden');
                finalVerdict.classList.remove('opacity-50');

            } catch (err) {
                alert("审判中断：" + err.message);
            } finally {
                judgeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
