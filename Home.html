<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>链接导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            position: relative;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #222;
            position: relative;
            display: inline-block;
            padding: 0 20px;
        }

        h1::before,
        h1::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #999);
            animation: lineExpand 1s ease-out forwards;
        }

        h1::before {
            right: 100%;
            background: linear-gradient(90deg, #999, transparent);
        }

        h1::after {
            left: 100%;
        }

        @keyframes lineExpand {
            from { width: 0; }
            to { width: 60px; }
        }

        .section {
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .section:nth-child(2) { animation-delay: 0.2s; }
        .section:nth-child(3) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 40px;
            height: 1px;
            background: #333;
            transition: width 0.3s ease;
        }

        .section:hover .section-title::after {
            width: 100%;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            text-decoration: none;
            color: #444;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 2px;
            height: 100%;
            background: #333;
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .link-item:hover {
            border-color: #ccc;
            transform: translateX(4px);
        }

        .link-item:hover::before {
            transform: scaleY(1);
        }

        .link-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .link-item:hover .link-icon {
            opacity: 1;
        }

        .link-text {
            font-size: 0.95rem;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .image-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .image-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-radius: 4px;
            transition: border-color 0.3s ease;
            pointer-events: none;
        }

        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }

        .image-card:hover::after {
            border-color: #333;
        }

        .image-card img {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: contain;
            display: block;
            transition: transform 0.5s ease;
            cursor: pointer;
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .lightbox-close:hover {
            opacity: 1;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #e8e8e8;
            color: #aaa;
            font-size: 0.8rem;
        }

        footer p {
            margin: 4px 0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 16px;
            }

            h1 {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }

            .links-grid,
            .images-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>导航</h1>
        </header>

        <section class="section">
            <h2 class="section-title">快速链接</h2>
            <div class="links-grid">
                <a href="https://www.yuque.com/yuqueyonghutypb9n/ryvzz3/xvtz2xilnxq0d9hy?singleDoc#" class="link-item">
                    <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    <span class="link-text">使用说明</span>
                </a>
                <a href="#" class="link-item">
                    <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    <span class="link-text">友情链接</span>
                </a>
                <a href="#" class="link-item">
                    <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    <span class="link-text">友情链接</span>
                </a>
                <a href="#" class="link-item">
                    <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="14" x2="21" y2="3"></line>
                    </svg>
                    <span class="link-text">友情链接</span>
                </a>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">图片展示</h2>
            <div class="images-grid">
                <div class="image-card">
                    <img src="客服微信.jpg" alt="客服微信" onclick="openLightbox(this.src, this.alt)">
                </div>
                <div class="image-card">
                    <img src="赞赏码.jpg" alt="赞赏码" onclick="openLightbox(this.src, this.alt)">
                </div>
            </div>
        </section>

        <div class="lightbox" id="lightbox" onclick="closeLightbox()">
            <span class="lightbox-close">&times;</span>
            <img id="lightbox-img" src="" alt="">
        </div>

        <footer>
            <p>© 2026</p>
            <p>By Nai</p>
        </footer>
    </div>

    <script>
        function openLightbox(src, alt) {
            var lightbox = document.getElementById('lightbox');
            var img = document.getElementById('lightbox-img');
            img.src = src;
            img.alt = alt;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            var lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
        }
    </script>
</body>
</html>
